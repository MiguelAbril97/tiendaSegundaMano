{% extends "principal.html" %}
   
{%block cabecera%}

<h1>Lista de Consolas</h1>

{% endblock %}

{% block contenido %}
    <ul>
        {{mensaje}}
        {% for consola in consolas %}
            <li>
                {%include 'consolas/consola.html'%}
            </li>
        {% empty %}
            <p>No hay consolas disponibles en este momento.</p>
        {% endfor %}
    </ul>
{% endblock %}
